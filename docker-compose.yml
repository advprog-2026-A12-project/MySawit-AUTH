services:
  app:
    build: .
    container_name: auth-app
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8001:8001"
    environment:
      APP_PROFILE: ${APP_PROFILE:-dev} 
      SERVER_PORT: ${SERVER_PORT:-8001}
      ADMIN_INITIAL_SECRET: ${ADMIN_INITIAL_SECRET:-admin123}
      DB_URL_DEV: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-auth_db_dev}
      DB_USER_DEV: ${POSTGRES_USER:-postgres}
      DB_PASSWORD_DEV: ${POSTGRES_PASSWORD:-postgres}
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-auth_db_dev}
      DB_USER: ${POSTGRES_USER:-postgres}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-secret}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-postmessage}
      

