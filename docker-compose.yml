services:
  app:
    build: .
    container_name: auth-app
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      APP_PROFILE: local
      SERVER_PORT: 8001
      DB_URL_LOCAL: jdbc:postgresql://postgres:5432/auth_db_local
      DB_USER_LOCAL: postgres
      DB_PASSWORD_LOCAL: postgres
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:16-alpine
    container_name: auth-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: auth_db_local
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_db_local"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
