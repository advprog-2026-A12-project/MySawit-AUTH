services:
  app:
    build: .
    container_name: auth-app
    restart: unless-stopped
    cpus: "1.0"
    mem_limit: 1024m
    mem_reservation: 768m
    env_file:
      - .env
    ports:
      - "8001:8001"
    environment:
      APP_PROFILE: ${APP_PROFILE:-dev} 
      SERVER_PORT: ${SERVER_PORT:-8001}
      ADMIN_INITIAL_SECRET: ${ADMIN_INITIAL_SECRET:-admin123}
      DB_URL_DEV: ${DB_URL_DEV}
      DB_USER_DEV: ${DB_USER_DEV}
      DB_PASSWORD_DEV: ${DB_PASSWORD_DEV}
      DB_URL: ${DB_URL}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET:-secret}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-postmessage}
      PAYMENT_SERVICE_BASE_URL: ${PAYMENT_SERVICE_BASE_URL:-}
      PAYMENT_INTERNAL_API_KEY: ${PAYMENT_INTERNAL_API_KEY:-}
      JAVA_TOOL_OPTIONS: ${JAVA_TOOL_OPTIONS:-}
      

