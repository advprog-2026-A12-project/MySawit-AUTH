services:
  postgres:
    image: postgres:16-alpine
    container_name: auth-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-auth_db_dev}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-auth_db_dev}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build: .
    container_name: auth-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    ports:
      - "8001:8001"
    environment:
      APP_PROFILE: ${APP_PROFILE:-dev} 
      SERVER_PORT: ${SERVER_PORT:-8001}
      ADMIN_INITIAL_SECRET: ${ADMIN_INITIAL_SECRET:-admin123}
      DB_URL_DEV: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-auth_db_dev}
      DB_USER_DEV: ${POSTGRES_USER:-postgres}
      DB_PASSWORD_DEV: ${POSTGRES_PASSWORD:-postgres}
      JWT_SECRET: ${JWT_SECRET:-secret}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      GOOGLE_REDIRECT_URI: ${GOOGLE_REDIRECT_URI:-postmessage}
      

volumes:
  postgres-data:
