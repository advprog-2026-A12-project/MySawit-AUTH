name: CI-CD

on:
  push:
    branches: ["main", "staging"]
  pull_request:
    branches: ["main", "staging"]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  security-events: write

concurrency:
  group: auth-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analysis:
    runs-on: ubuntu-latest
    env:
      POSTGRES_DB: authdb_test
      POSTGRES_USER: ${{ secrets.POSTGRES_USER_TEST }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD_TEST }}
      POSTGRES_PORT: 6001
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: authdb_test
          POSTGRES_USER: ${{ secrets.POSTGRES_USER_TEST }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD_TEST }}
        ports:
          - 6001:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: "21"
          distribution: "temurin"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build + test + coverage
        run: ./gradlew test jacocoTestReport

      - name: Analyze with SonarCloud
        run: ./gradlew sonar
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN_AUTH }}

  deploy_staging:
    needs: analysis
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    steps:
      - name: Deploy to Staging (skeleton only)
        run: |
          echo "Deploying to STAGING environment..."
          echo "Skeleton only: no real deployment action is executed."

  deploy_production:
    needs: analysis
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    environment:
      name: production
    steps:
      - name: Validate Docker Hub configuration
        run: |
          test -n "${{ vars.DOCKERHUB_REPOSITORY }}" || (echo "Missing repository variable DOCKERHUB_REPOSITORY (example: username/auth-service)" && exit 1)
          test -n "${{ secrets.DOCKERHUB_USERNAME }}" || (echo "Missing secret DOCKERHUB_USERNAME" && exit 1)
          test -n "${{ secrets.DOCKERHUB_TOKEN }}" || (echo "Missing secret DOCKERHUB_TOKEN" && exit 1)

      - name: Validate blue/green deployment configuration
        run: |
          test -n "${{ secrets.EC2_BLUE_HOST }}" || (echo "Missing secret EC2_BLUE_HOST" && exit 1)
          test -n "${{ secrets.EC2_GREEN_HOST }}" || (echo "Missing secret EC2_GREEN_HOST" && exit 1)
          test -n "${{ secrets.EC2_USERNAME }}" || (echo "Missing secret EC2_USERNAME" && exit 1)
          test -n "${{ secrets.EC2_SSH_PRIVATE_KEY }}" || (echo "Missing secret EC2_SSH_PRIVATE_KEY" && exit 1)
          test -n "${{ vars.AWS_REGION }}" || (echo "Missing variable AWS_REGION" && exit 1)
          test -n "${{ vars.ALB_AUTH_RULE_ARN }}" || (echo "Missing variable ALB_AUTH_RULE_ARN" && exit 1)
          test -n "${{ vars.TG_AUTH_BLUE_ARN }}" || (echo "Missing variable TG_AUTH_BLUE_ARN" && exit 1)
          test -n "${{ vars.TG_AUTH_GREEN_ARN }}" || (echo "Missing variable TG_AUTH_GREEN_ARN" && exit 1)

      - name: Checkout
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: |
            ${{ vars.DOCKERHUB_REPOSITORY }}:sha-${{ github.sha }}
            ${{ vars.DOCKERHUB_REPOSITORY }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Prepare SSH key for control-plane commands
        env:
          EC2_SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
        run: |
          set -euo pipefail
          printf '%s\n' "$EC2_SSH_PRIVATE_KEY" > /tmp/ec2_ssh_key
          chmod 600 /tmp/ec2_ssh_key

      - name: Plan blue/green target
        id: route_plan
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          ALB_AUTH_RULE_ARN: ${{ vars.ALB_AUTH_RULE_ARN }}
          TG_AUTH_BLUE_ARN: ${{ vars.TG_AUTH_BLUE_ARN }}
          TG_AUTH_GREEN_ARN: ${{ vars.TG_AUTH_GREEN_ARN }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
          CONTROL_HOST: ${{ secrets.EC2_BLUE_HOST }}
          EC2_BLUE_HOST: ${{ secrets.EC2_BLUE_HOST }}
          EC2_GREEN_HOST: ${{ secrets.EC2_GREEN_HOST }}
        run: |
          set -euo pipefail
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR"
          ssh $SSH_OPTS -i /tmp/ec2_ssh_key "$EC2_USERNAME@$CONTROL_HOST" \
            "aws elbv2 describe-rules --region '$AWS_REGION' --rule-arns '$ALB_AUTH_RULE_ARN' --output json" \
            > /tmp/alb-rule.json
          python - <<'PY'
          import json
          import os
          import sys

          with open("/tmp/alb-rule.json", "r", encoding="utf-8") as fh:
              payload = json.load(fh)

          rule = payload["Rules"][0]
          forward_actions = [action for action in rule.get("Actions", []) if action.get("Type") == "forward"]
          if not forward_actions:
              print("No forward action found in ALB rule", file=sys.stderr)
              sys.exit(1)

          target_groups = forward_actions[0].get("ForwardConfig", {}).get("TargetGroups", [])
          weights = {tg.get("TargetGroupArn"): int(tg.get("Weight", 0)) for tg in target_groups}

          blue_arn = os.environ["TG_AUTH_BLUE_ARN"]
          green_arn = os.environ["TG_AUTH_GREEN_ARN"]

          if blue_arn not in weights or green_arn not in weights:
              print("ALB rule must include both blue and green target groups", file=sys.stderr)
              sys.exit(1)

          blue_weight = weights[blue_arn]
          green_weight = weights[green_arn]

          if blue_weight > green_weight:
              current_live = "blue"
              deploy_target = "green"
              target_host = os.environ["EC2_GREEN_HOST"]
          elif green_weight > blue_weight:
              current_live = "green"
              deploy_target = "blue"
              target_host = os.environ["EC2_BLUE_HOST"]
          else:
              print("Cannot infer live color when blue and green weights are equal", file=sys.stderr)
              sys.exit(1)

          out = os.environ["GITHUB_OUTPUT"]
          with open(out, "a", encoding="utf-8") as fh:
              fh.write(f"current_live={current_live}\n")
              fh.write(f"deploy_target={deploy_target}\n")
              fh.write(f"target_host={target_host}\n")
              fh.write(f"blue_weight={blue_weight}\n")
              fh.write(f"green_weight={green_weight}\n")
          PY

      - name: Deploy container to target color via SSH
        uses: appleboy/ssh-action@v1.2.5
        env:
          DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
          DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
          IMAGE: ${{ vars.DOCKERHUB_REPOSITORY }}:sha-${{ github.sha }}
          CONTAINER_NAME: ${{ vars.EC2_CONTAINER_NAME || 'auth-app' }}
          HOST_PORT: ${{ vars.EC2_HOST_PORT || '8001' }}
          CONTAINER_PORT: ${{ vars.EC2_CONTAINER_PORT || '8001' }}
          ENV_FILE_PATH: ${{ vars.EC2_ENV_FILE_PATH || '/opt/auth/.env' }}
          HEALTHCHECK_URL: ${{ vars.EC2_HEALTHCHECK_URL || '' }}
          APP_PROFILE: ${{ vars.APP_PROFILE || '' }}
          SERVER_PORT: ${{ vars.SERVER_PORT || '' }}
          ADMIN_INITIAL_SECRET: ${{ secrets.ADMIN_INITIAL_SECRET || '' }}
          DB_URL: ${{ vars.DB_URL || '' }}
          DB_USER: ${{ vars.DB_USER || vars.DB_USER_DEV || '' }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD || secrets.DB_PASSWORD_DEV || '' }}
          JWT_SECRET: ${{ secrets.JWT_SECRET || '' }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID || '' }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET || '' }}
          GOOGLE_REDIRECT_URI: ${{ vars.GOOGLE_REDIRECT_URI || '' }}
          PAYMENT_SERVICE_BASE_URL: ${{ secrets.PAYMENT_SERVICE_BASE_URL || vars.PAYMENT_SERVICE_BASE_URL || '' }}
          PAYMENT_INTERNAL_API_KEY: ${{ secrets.PAYMENT_INTERNAL_API_KEY || '' }}
          PAYMENT_WALLET_CREATE_PATH: ${{ vars.PAYMENT_WALLET_CREATE_PATH || '' }}
          POSTGRES_DB: ${{ vars.POSTGRES_DB || '' }}
          POSTGRES_USER: ${{ vars.POSTGRES_USER || '' }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD || '' }}
        with:
          host: ${{ steps.route_plan.outputs.target_host }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          port: ${{ secrets.EC2_PORT || 22 }}
          envs: DOCKERHUB_USERNAME,DOCKERHUB_TOKEN,IMAGE,CONTAINER_NAME,HOST_PORT,CONTAINER_PORT,ENV_FILE_PATH,HEALTHCHECK_URL,APP_PROFILE,SERVER_PORT,ADMIN_INITIAL_SECRET,DB_URL,DB_USER,DB_PASSWORD,JWT_SECRET,GOOGLE_CLIENT_ID,GOOGLE_CLIENT_SECRET,GOOGLE_REDIRECT_URI,PAYMENT_SERVICE_BASE_URL,PAYMENT_INTERNAL_API_KEY,PAYMENT_WALLET_CREATE_PATH,POSTGRES_DB,POSTGRES_USER,POSTGRES_PASSWORD
          script: |
            set -euo pipefail
            echo "$DOCKERHUB_TOKEN" | docker login -u "$DOCKERHUB_USERNAME" --password-stdin
            docker pull "$IMAGE"

            docker stop "$CONTAINER_NAME" || true
            docker rm "$CONTAINER_NAME" || true

            run_env_args=()
            for key in APP_PROFILE SERVER_PORT ADMIN_INITIAL_SECRET DB_URL DB_USER DB_PASSWORD JWT_SECRET GOOGLE_CLIENT_ID GOOGLE_CLIENT_SECRET GOOGLE_REDIRECT_URI PAYMENT_SERVICE_BASE_URL PAYMENT_INTERNAL_API_KEY PAYMENT_WALLET_CREATE_PATH POSTGRES_DB POSTGRES_USER POSTGRES_PASSWORD; do
              val="${!key:-}"
              if [ -n "$val" ]; then
                run_env_args+=(-e "$key=$val")
              fi
            done

            env_file_args=()
            if [ -n "${ENV_FILE_PATH:-}" ] && [ -f "$ENV_FILE_PATH" ]; then
              env_file_args+=(--env-file "$ENV_FILE_PATH")
              echo "Using env file: $ENV_FILE_PATH"
            else
              echo "ENV file not found or not set; deploying with GitHub-provided env only"
            fi

            docker run -d \
              --name "$CONTAINER_NAME" \
              --restart unless-stopped \
              "${env_file_args[@]}" \
              "${run_env_args[@]}" \
              -p "$HOST_PORT:$CONTAINER_PORT" \
              "$IMAGE"

            # Verify container is running
            sleep 5
            if [ "$(docker inspect -f '{{.State.Running}}' "$CONTAINER_NAME")" != "true" ]; then
              echo "Container is not running"
              docker ps -a --filter "name=$CONTAINER_NAME"
              docker logs --tail 200 "$CONTAINER_NAME" || true
              exit 1
            fi

            # Optional HTTP healthcheck with retries
            if [ -n "${HEALTHCHECK_URL}" ]; then
              i=1
              until [ "$i" -gt 12 ]
              do
                if curl -fsS --max-time 5 "$HEALTHCHECK_URL" >/dev/null; then
                  echo "Healthcheck passed: $HEALTHCHECK_URL"
                  break
                fi
                if [ "$i" -eq 12 ]; then
                  echo "Healthcheck failed: $HEALTHCHECK_URL"
                  docker logs --tail 200 "$CONTAINER_NAME" || true
                  exit 1
                fi
                sleep 5
                i=$((i+1))
              done
            fi

            docker image prune -f

      - name: Switch 100% traffic to deployed color
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
          CONTROL_HOST: ${{ secrets.EC2_BLUE_HOST }}
          ALB_AUTH_RULE_ARN: ${{ vars.ALB_AUTH_RULE_ARN }}
          TG_AUTH_BLUE_ARN: ${{ vars.TG_AUTH_BLUE_ARN }}
          TG_AUTH_GREEN_ARN: ${{ vars.TG_AUTH_GREEN_ARN }}
          DEPLOY_TARGET: ${{ steps.route_plan.outputs.deploy_target }}
        run: |
          set -euo pipefail
          if [ "$DEPLOY_TARGET" = "blue" ]; then
            TARGET_TG_ARN="$TG_AUTH_BLUE_ARN"
          else
            TARGET_TG_ARN="$TG_AUTH_GREEN_ARN"
          fi

          # Wait until every registered target in destination TG is healthy.
          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR"
          ssh $SSH_OPTS -i /tmp/ec2_ssh_key "$EC2_USERNAME@$CONTROL_HOST" \
            "AWS_REGION='$AWS_REGION' TARGET_TG_ARN='$TARGET_TG_ARN' bash -se" <<'EOF'
          set -euo pipefail
          timeout_secs=300
          sleep_secs=10
          waited=0

          while [ "$waited" -lt "$timeout_secs" ]; do
            health_json="$(aws elbv2 describe-target-health --region "$AWS_REGION" --target-group-arn "$TARGET_TG_ARN" --output json)"
            total="$(printf '%s' "$health_json" | jq '.TargetHealthDescriptions | length')"
            healthy="$(printf '%s' "$health_json" | jq '[.TargetHealthDescriptions[] | select(.TargetHealth.State=="healthy")] | length')"

            if [ "$total" -gt 0 ] && [ "$healthy" -eq "$total" ]; then
              echo "Target group healthy: $healthy/$total"
              exit 0
            fi

            echo "Waiting target group healthy: $healthy/$total"
            sleep "$sleep_secs"
            waited=$((waited + sleep_secs))
          done

          echo "Timed out waiting for target group health"
          echo "$health_json"
          exit 1
          EOF

          if [ "$DEPLOY_TARGET" = "blue" ]; then
            BLUE_WEIGHT=100
            GREEN_WEIGHT=0
          else
            BLUE_WEIGHT=0
            GREEN_WEIGHT=100
          fi

          ssh $SSH_OPTS -i /tmp/ec2_ssh_key "$EC2_USERNAME@$CONTROL_HOST" \
            "AWS_REGION='$AWS_REGION' ALB_AUTH_RULE_ARN='$ALB_AUTH_RULE_ARN' TG_AUTH_BLUE_ARN='$TG_AUTH_BLUE_ARN' TG_AUTH_GREEN_ARN='$TG_AUTH_GREEN_ARN' BLUE_WEIGHT='$BLUE_WEIGHT' GREEN_WEIGHT='$GREEN_WEIGHT' bash -se" <<'EOF'
          cat > /tmp/alb-actions-switch.json <<JSON
          [{
            "Type":"forward",
            "ForwardConfig":{
              "TargetGroups":[
                {"TargetGroupArn":"${TG_AUTH_BLUE_ARN}","Weight":${BLUE_WEIGHT}},
                {"TargetGroupArn":"${TG_AUTH_GREEN_ARN}","Weight":${GREEN_WEIGHT}}
              ]
            }
          }]
          JSON

          aws elbv2 modify-rule \
            --region "$AWS_REGION" \
            --rule-arn "$ALB_AUTH_RULE_ARN" \
            --actions file:///tmp/alb-actions-switch.json
          EOF

      - name: Smoke test production endpoint after switch
        env:
          SMOKE_URL: ${{ vars.PRODUCTION_SMOKE_URL || 'https://api.sushiikan.me/api/v1/users/me' }}
          EXPECTED_STATUS: ${{ vars.PRODUCTION_SMOKE_EXPECTED_STATUS || '401' }}
        run: |
          set -euo pipefail
          status="$(curl -sS -o /dev/null -w '%{http_code}' --max-time 15 "$SMOKE_URL")"
          echo "Smoke URL: $SMOKE_URL"
          echo "HTTP status: $status"
          if [ "$status" != "$EXPECTED_STATUS" ]; then
            echo "Unexpected smoke test status: expected $EXPECTED_STATUS, got $status"
            exit 1
          fi

      - name: Roll back ALB traffic to original live color on failure
        if: failure() && steps.route_plan.outputs.current_live != ''
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
          CONTROL_HOST: ${{ secrets.EC2_BLUE_HOST }}
          ALB_AUTH_RULE_ARN: ${{ vars.ALB_AUTH_RULE_ARN }}
          TG_AUTH_BLUE_ARN: ${{ vars.TG_AUTH_BLUE_ARN }}
          TG_AUTH_GREEN_ARN: ${{ vars.TG_AUTH_GREEN_ARN }}
          CURRENT_LIVE: ${{ steps.route_plan.outputs.current_live }}
        run: |
          set -euo pipefail
          if [ "$CURRENT_LIVE" = "blue" ]; then
            BLUE_WEIGHT=100
            GREEN_WEIGHT=0
          else
            BLUE_WEIGHT=0
            GREEN_WEIGHT=100
          fi

          SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o LogLevel=ERROR"
          ssh $SSH_OPTS -i /tmp/ec2_ssh_key "$EC2_USERNAME@$CONTROL_HOST" \
            "AWS_REGION='$AWS_REGION' ALB_AUTH_RULE_ARN='$ALB_AUTH_RULE_ARN' TG_AUTH_BLUE_ARN='$TG_AUTH_BLUE_ARN' TG_AUTH_GREEN_ARN='$TG_AUTH_GREEN_ARN' BLUE_WEIGHT='$BLUE_WEIGHT' GREEN_WEIGHT='$GREEN_WEIGHT' bash -se" <<'EOF'
          cat > /tmp/alb-actions-rollback.json <<JSON
          [{
            "Type":"forward",
            "ForwardConfig":{
              "TargetGroups":[
                {"TargetGroupArn":"${TG_AUTH_BLUE_ARN}","Weight":${BLUE_WEIGHT}},
                {"TargetGroupArn":"${TG_AUTH_GREEN_ARN}","Weight":${GREEN_WEIGHT}}
              ]
            }
          }]
          JSON

          aws elbv2 modify-rule \
            --region "$AWS_REGION" \
            --rule-arn "$ALB_AUTH_RULE_ARN" \
            --actions file:///tmp/alb-actions-rollback.json
          EOF
