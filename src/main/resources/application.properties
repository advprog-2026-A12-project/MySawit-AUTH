spring.config.import=optional:file:.env[.properties]
spring.application.name=Auth
server.port=${SERVER_PORT:8001}
spring.profiles.active=${APP_PROFILE:local}

google.client-id=${GOOGLE_CLIENT_ID:}
google.client-secret=${GOOGLE_CLIENT_SECRET:}
google.redirect-uri=${GOOGLE_REDIRECT_URI:postmessage}

jwt.access-token-expiration=${JWT_ACCESS_EXPIRATION:21600}
app.bootstrap.admin-initial-secret=${ADMIN_INITIAL_SECRET:}

management.endpoints.web.exposure.include=health,prometheus
management.endpoint.health.show-details=never
management.endpoint.prometheus.access=unrestricted
management.metrics.distribution.percentiles-histogram.http.server.requests=true
management.metrics.distribution.slo.http.server.requests=100ms,200ms,300ms,500ms,1s,2s,5s
